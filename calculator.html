<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节能计算器 - 辰诺节能</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #FFFFFF; color: #4B5563; overflow-x: hidden;
            padding-bottom: 60px;
        }
        
        
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 70px; background: #fff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05); position: fixed; width: 100%; top: 0; z-index: 100;
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
        .nav-brand-text { font-size: 20px; font-weight: 700; color: #4CAF50; letter-spacing: 1px; }

        .back-link {
            text-decoration: none; color: #666; font-size: 15px;
            display: flex; align-items: center; gap: 8px; transition: color 0.2s;
        }
        .back-link:hover { color: #4CAF50; }
        .logo { font-size: 20px; font-weight: 700; color: #4CAF50; }

        /* Hero */
        .hero {
            padding: 140px 20px 60px; text-align: center; background: #FAFAFA;
        }
        .hero h1 {
            color: #4B5563; font-size: 36px; margin-bottom: 16px; color: #4B5563; }
        .hero p { font-size: 16px; color: #666; margin-bottom: 30px; }

        /* 容器 */
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

        /* 图表区 */
        .chart-section {
            background: #fff; padding: 40px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: -30px;
        }
        .chart-section h2 { font-size: 22px; margin-bottom: 30px; }
        
        .bar-row {
            display: flex; align-items: center; margin-bottom: 12px; font-size: 14px;
        }
        .city-name { width: 80px; text-align: right; padding-right: 15px; color: #666; flex-shrink: 0; }
        .bar-bg { flex-grow: 1; background: #F0F2F5; height: 24px; border-radius: 4px; overflow: hidden; position: relative; }
        .bar-fill {
            height: 100%; background: linear-gradient(90deg, #0066FF, #00AAFF);
            border-radius: 4px; transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 0;
        }
        .bar-value {
            position: absolute; right: 10px; top: 2px; color: #fff; font-weight: 600; font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* 计算器区 */
        .calc-section {
            background: #fff; padding: 40px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 30px;
        }
        .calc-section h2 { font-size: 22px; margin-bottom: 20px; text-align: center; }
        
        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
        }
        .form-item label {
            display: block; margin-bottom: 8px; font-size: 14px; color: #666;
        }
        .form-item input {
            width: 100%; padding: 12px; border: 1px solid #E0E0E0; border-radius: 8px;
            font-size: 16px; transition: border 0.2s;
        }
        .form-item input:focus { border-color: #4CAF50; outline: none; }
        
        .full-width { grid-column: span 2; }

        .calc-btn {
            width: 100%; padding: 16px; background: #4CAF50; color: #fff; border: none;
            border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .calc-btn:hover { background: #0052CC; }

        /* 结果展示 */
        .result-box {
            margin-top: 30px; padding: 30px; background: #F0F7FF; border-radius: 12px;
            text-align: center; display: none; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-box h3 { font-size: 18px; color: #666; margin-bottom: 10px; }
        .result-box .money {
            font-size: 48px; color: #00A86B; font-weight: 700; font-family: "DIN Alternate", sans-serif;
            margin-bottom: 20px;
        }
        .result-box .sub { font-size: 14px; color: #999; }
        
        .contact-btn {
            display: inline-block; margin-top: 20px; padding: 12px 30px;
            background: #00A86B; color: #fff; border-radius: 6px; text-decoration: none;
            font-weight: 500; transition: opacity 0.2s;
        }
        .contact-btn:hover { opacity: 0.9; }

        /* 响应式 */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .hero h1 {
            color: #4B5563; font-size: 28px; }
            .bar-row { margin-bottom: 8px; }
        }

        /* Tooltip 样式 */
        .bar-bg { position: relative; cursor: pointer; }
        .tooltip {
            display: none; position: absolute; left: 50%; top: -36px; transform: translateX(-50%);
            background: rgba(20,20,20,0.85); color: #fff; padding: 6px 12px; border-radius: 6px;
            font-size: 12px; white-space: nowrap; z-index: 20; pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .tooltip::after {
            content: ''; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent;
            border-top: 5px solid rgba(20,20,20,0.85);
        }
        .bar-bg:hover .tooltip { display: block; animation: fadeInTip 0.2s ease; }
        @keyframes fadeInTip { from { opacity: 0; transform: translateX(-50%) translateY(4px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }


        .highlight-word {
            font-size: 1.5em; /* 比其他字大 50% */
            color: #4CAF50 !important;   /* Logo 绿 */
            font-weight: 800; /* 加粗 */
            margin: 0 4px;
        }

    </style>
</head>
<body>

    <!-- 导航 -->
    <nav class="navbar">
        <a href="index.html" class="back-link">
            ← 返回辰诺主页
        </a>
        
<div class="nav-brand">
    <img src="logo.png" alt="Logo" height="42" style="object-fit: contain;">
    <span class="nav-brand-text">辰诺节能</span>
</div>

    </nav>

    <!-- 头部 -->
    <section class="hero">
        <h1>看看您所在地区能<span class="highlight-word">省</span>多少钱</h1>
        <p>基于 1000m³/h 标准机组模型 · 24 小时运行 · 真实数据参考</p>
    </section>

    <div class="container">
        
        <!-- 图表排行 -->
        <section class="chart-section">
            <h2>📊 全国 32 城年节省预估排行 (万元)</h2>
            <div id="chart" style="margin-top: 20px;">
                <!-- 动态生成 -->
            </div>
            <p style="margin-top: 20px; font-size: 12px; color: #999; text-align: center;">
                * 数据模型：1000m³/h 机组，年运行 8760 小时。<br>
                节省来源 = 0 电耗(27.55 万) + 节水(约 16-32 万) + 免维保(1.7 万)。
            </p>
        </section>

        <!-- 计算器 -->
        <section class="calc-section">
            <h2>🧮 定制化计算您的收益</h2>
            <div class="form-grid">
                <div class="form-item">
                    <label>日运行时长 (小时)</label>
                    <input type="number" id="hours" value="24">
                </div>
                <div class="form-item">
                    <label>年运行天数 (天)</label>
                    <input type="number" id="days" value="365">
                </div>
                <div class="form-item">
                    <label>当地工业电价 (元/度)</label>
                    <input type="number" id="elecPrice" value="0.85" step="0.01">
                </div>
                <div class="form-item">
                    <label>当地水费 + 排污费 (元/吨)</label>
                    <input type="number" id="waterPrice" value="6.14" step="0.1">
                    <small style="color:#999; display:block; margin-top:4px;">* 工业终端水价 = 自来水费 + 污水处理费</small>
                </div>
                <div class="form-item full-width">
                    <button class="calc-btn" onclick="calculate()">开始计算节省金额</button>
                </div>
            </div>

            <!-- 结果 -->
            <div class="result-box" id="resultBox">
                <h3>预计每年为您节省</h3>
                <div class="money">¥ <span id="saveTotal">0</span></div>
                <p class="sub" id="detailText">
                    其中：节省电费 ¥0 | 节省水费 ¥0 | 节省维保 ¥0
                </p>
                <a href="https://wa.me/8613800000000" target="_blank" class="contact-btn">
                    💬 微信联系获取详细报价方案
                </a>
            </div>
        </section>

    </div>

    <script>
        // 城市数据 (按预估总节省排序，单位：万元)
        // 逻辑：基准电费 27.55 + 水费 (2.592 万吨 * 综合水价) + 维保 1.7
        // 假设水价：北京 12, 上海 10.5, 广州 8.5, 深圳 6.5, 杭州 9, 成都 6, 武汉 6.5, 西安 7.5...
        // 基于 2026年3月 真实数据
        // 电价：各省代理购电平段均价
        // 水价：终端综合水价（自来水+污水处理费）
        const cities = [
            { name: "广东", elec: 0.68, water: 7.5 },
            { name: "浙江", elec: 0.65, water: 9.0 },
            { name: "上海", elec: 0.65, water: 10.0 },
            { name: "江苏", elec: 0.62, water: 8.5 },
            { name: "北京", elec: 0.63, water: 14.0 },
            { name: "福建", elec: 0.62, water: 6.5 },
            { name: "山东", elec: 0.60, water: 7.5 },
            { name: "湖南", elec: 0.60, water: 6.5 },
            { name: "安徽", elec: 0.59, water: 7.0 },
            { name: "天津", elec: 0.58, water: 11.0 },
            { name: "河南", elec: 0.56, water: 7.0 },
            { name: "江西", elec: 0.57, water: 6.5 },
            { name: "湖北", elec: 0.58, water: 6.5 },
            { name: "重庆", elec: 0.58, water: 6.5 },
            { name: "四川", elec: 0.55, water: 6.0 },
            { name: "河北", elec: 0.55, water: 8.0 },
            { name: "广西", elec: 0.52, water: 6.0 },
            { name: "海南", elec: 0.65, water: 5.5 },
            { name: "山西", elec: 0.50, water: 7.0 },
            { name: "辽宁", elec: 0.50, water: 6.5 },
            { name: "吉林", elec: 0.48, water: 6.0 },
            { name: "陕西", elec: 0.48, water: 7.0 },
            { name: "黑龙江", elec: 0.47, water: 6.0 },
            { name: "贵州", elec: 0.45, water: 6.0 },
            { name: "云南", elec: 0.42, water: 5.5 },
            { name: "甘肃", elec: 0.40, water: 6.0 },
            { name: "内蒙古", elec: 0.38, water: 5.5 },
            { name: "宁夏", elec: 0.38, water: 5.0 },
            { name: "青海", elec: 0.36, water: 5.0 },
            { name: "新疆", elec: 0.35, water: 5.0 },
            { name: "西藏", elec: 0.40, water: 4.5 }
        ];

        // 计算并渲染图表
        function renderChart() {
            const chartEl = document.getElementById('chart');
            let html = '';
            
            // 计算每个城市的总节省（万元）
            // 省电费 = 37kW × 8760h × 电价 / 10000
            // 省水费 = 2.592万吨 × 水价 / 10000
            // 省维保 = 1.7
            cities.forEach(city => {
                const elecSave = 37 * 8760 * city.elec / 10000;
                const waterSave = 2.592 * city.water;
                const totalSave = elecSave + waterSave + 1.7;
                city.elecSave = elecSave;
                city.waterSave = waterSave;
                city.totalSave = totalSave;
            });

            // 按总节省排序
            cities.sort((a, b) => b.totalSave - a.totalSave);

            // 找最大值用于比例
            const maxVal = cities[0].totalSave;

            // 生成 HTML
            cities.forEach((city, index) => {
                const percent = (city.totalSave / (maxVal * 1.1)) * 100;
                
                // 颜色：前三名高亮
                let color = 'linear-gradient(90deg, #0066FF, #00AAFF)';
                if(index < 3) color = 'linear-gradient(90deg, #FF6B35, #FF9F1C)';

                html += `
                    <div class="bar-row">
                        <div class="city-name">${index + 1}. ${city.name}</div>
                        <div class="bar-bg" 
                             data-elec="${city.elec.toFixed(2)}" 
                             data-water="${city.water.toFixed(1)}">
                            <div class="bar-fill" style="width: 0%; background: ${color}; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);" data-target="${percent}"></div>
                            <span class="bar-value">${city.totalSave.toFixed(1)}万</span>
                            <div class="tooltip">⚡ 电价: ${city.elec.toFixed(2)}元/度 | 💧 水价: ${city.water.toFixed(1)}元/吨</div>
                        </div>
                    </div>
                `;
            });
            chartEl.innerHTML = html;
        }

        // 计算逻辑
        function calculate() {
            const hours = parseFloat(document.getElementById('hours').value);
            const days = parseFloat(document.getElementById('days').value);
            const elecPrice = parseFloat(document.getElementById('elecPrice').value);
            const waterPrice = parseFloat(document.getElementById('waterPrice').value);

            if (!hours || !elecPrice || !waterPrice) {
                alert("请填写完整数据");
                return;
            }

            const runHours = hours * days;
            const waterFactor = runHours / (24 * 365); // 运行系数

            // 1000m³/h 机组参数 (基于真实数据模型)
            // 省电费 = 37kW × 运行小时 × 电价
            const elecSave = (37 * runHours * elecPrice) / 10000; // 万元
            // 省水费 = 2.592万吨 × 综合水价 × 运行系数
            const waterSave = 2.592 * waterPrice * waterFactor; // 万元
            // 省维保 = 1.7万 × 运行系数
            const maintSave = 1.7 * waterFactor; // 万元

            const totalSave = elecSave + waterSave + maintSave;

            // 更新 UI
            document.getElementById('saveTotal').innerText = (totalSave * 10000).toLocaleString(undefined, {maximumFractionDigits: 0});
            
            document.getElementById('detailText').innerHTML = `
                其中：<strong style="color:#0066FF">省电 ${(elecSave*10000).toLocaleString(undefined, {maximumFractionDigits: 0})}元</strong> | <strong style="color:#00A86B">省水 ${(waterSave*10000).toLocaleString(undefined, {maximumFractionDigits: 0})}元</strong> | <strong style="color:#666">省维保 ${(maintSave*10000).toLocaleString(undefined, {maximumFractionDigits: 0})}元</strong>
            `;

            document.getElementById('resultBox').style.display = 'block';
            // 滚动到底部
            document.getElementById('resultBox').scrollIntoView({behavior: 'smooth'});
        }

        // 初始化
        window.onload = function() {
            renderChart();
            // 依次触发的柱状图动画
            const bars = document.querySelectorAll('.bar-fill');
            bars.forEach((bar, i) => {
                setTimeout(() => {
                    bar.style.width = bar.getAttribute('data-target') + '%';
                }, i * 60); // 每 60ms 出来一个
            });
        }
    </script>
</body>
</html>
